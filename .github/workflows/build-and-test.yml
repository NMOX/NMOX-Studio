name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Prove the cross-platform claim: the full verify (tests + SpotBugs gate)
    # runs on Linux and macOS, on the Java 21 LTS the app now targets.
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: maven
      - name: Build with Maven
        run: mvn -B verify
        # Git Bash serves the audit script on Windows; the boot smoke and
        # rendering probe stay POSIX-only below — the Windows launcher is a
        # .exe and the runner's display story differs (ledger 37). The test
        # suite IS the Windows gate; the assembled-app probes remain
        # Linux+macOS until the launcher-path work happens.
        shell: bash

      # Every module that ships test sources must have actually run them.
      # Guards the unbound-surefire class: the application module's tests
      # compiled but never executed until PR #70, and nothing flagged it.
      # Runs right after verify, while the surefire reports are fresh.
      - name: Test-execution audit
        run: ./scripts/test-execution-audit.sh
        shell: bash

      # --- Release-gating checks against the ASSEMBLED app -----------------
      # These run after verify (which packages application/target/nmoxstudio)
      # and exercise the real cluster, not a test harness — the gap that let
      # the commons_codec module collision and the white-editor bug ship.

      - name: Install Xvfb (Linux headless display)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Boot the assembled app from a fresh userdir and fail on any module
      # that could not be installed/enabled. The platform's window system
      # needs a display to reach the clean-quit path, so Linux runs under a
      # virtual framebuffer; macOS runners have a usable window server.
      - name: Boot smoke test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a ./scripts/boot-smoke-test.sh
      - name: Boot smoke test (macOS)
        if: runner.os == 'macOS'
        run: ./scripts/boot-smoke-test.sh

      # Boot once more with the color probe on and assert the editor's
      # RESOLVED colors are the dark scheme — the v1.10.1 white-editor
      # class, which packaged green for months. Same display requirement
      # as the boot smoke test.
      - name: Rendering probe (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a ./scripts/rendering-probe.sh
      - name: Rendering probe (macOS)
        if: runner.os == 'macOS'
        run: ./scripts/rendering-probe.sh
