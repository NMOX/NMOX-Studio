name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Stamp version into branding
        run: |
          sed -i "s/currentVersion=NMOX Studio .*/currentVersion=NMOX Studio ${{ needs.version.outputs.version }}/" \
            branding/src/main/nbm-branding/core/core.jar/org/netbeans/core/startup/Bundle.properties
          # Module spec versions ride the same tag (ledger 20): every module
          # manifest interpolates the root <spec.version> property.
          sed -i "s|<spec.version>.*</spec.version>|<spec.version>${{ needs.version.outputs.version }}</spec.version>|" \
            pom.xml
      - name: Decode NBM signing keystore (optional)
        # Off unless the NBM_SIGNING_KEYSTORE_BASE64 secret is set. When it
        # is, the base64 secret becomes a keystore file and the -Dnbm.keystore
        # property activates the root pom's `sign-nbms` profile, so every
        # module NBM (and thus the update-center catalog) ships signed. Absent
        # the secret, NBMs ship unsigned exactly as before â€” no regression.
        # See docs/engineering/nbm-signing.md for keystore + secret setup.
        env:
          KEYSTORE_B64: ${{ secrets.NBM_SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/nmox-signing.jks"
            echo "NBM_SIGN=1" >> "$GITHUB_ENV"
            echo "::notice::NBM signing enabled â€” module NBMs will be signed."
          else
            echo "::notice::NBM signing skipped (NBM_SIGNING_KEYSTORE_BASE64 not set); NBMs ship unsigned."
          fi
      - name: Build application
        env:
          NBM_ALIAS: ${{ secrets.NBM_SIGNING_ALIAS }}
          NBM_PASS: ${{ secrets.NBM_SIGNING_PASSWORD }}
        run: |
          SIGN_ARGS=""
          if [ "${NBM_SIGN:-}" = "1" ]; then
            SIGN_ARGS="-Dnbm.keystore=$RUNNER_TEMP/nmox-signing.jks -Dnbm.keystorealias=$NBM_ALIAS -Dnbm.keystorepass=$NBM_PASS"
          fi
          mvn -B clean package -DskipTests $SIGN_ARGS
      - name: Software Bill of Materials (CycloneDX)
        run: |
          mvn -B org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom \
            -DoutputFormat=json -DoutputName=bom
          # The vendored js-debug adapter has no Maven coordinate, so the
          # aggregate BOM cannot see it (ledger 26). Append it by hand from
          # the facts pinned in editor/src/main/release/jsdebug/NOTICE so
          # the SBOM stops having a blind spot. Bump BOTH on upgrades.
          jq '.components += [{
                "type": "library",
                "name": "vscode-js-debug",
                "version": "1.117.0",
                "purl": "pkg:github/microsoft/vscode-js-debug@v1.117.0",
                "licenses": [{"license": {"id": "MIT"}}],
                "hashes": [{"alg": "SHA-256",
                  "content": "ad8d04ede9d4b75cc290fd5438a65047a06f786d04f604b6112485b36f090772"}],
                "description": "Vendored DAP server (editor/src/main/release/jsdebug); not resolved by Maven, bumped manually per NOTICE"
              }]' target/bom.json > target/bom-full.json
          mv target/bom-full.json target/bom.json
          cp target/bom.json "NMOX-Studio-${{ needs.version.outputs.version }}-sbom.json"
      - name: Update-center catalog (updates.xml + module NBMs)
        # In-app updates (ledger 21): the app's registered update center
        # fetches releases/latest/download/updates.xml, so every release
        # must ship the catalog + the 11 module NBMs it points at. The
        # script pins each NBM URL to THIS release tag (absolute URLs â€”
        # a cached older catalog must never download newer NBM bytes and
        # trip its own SHA-512 digests) and gates the module set.
        run: ./scripts/build-update-site.sh "${{ needs.version.outputs.version }}"
      - name: Portable zip
        run: |
          cp application/target/NMOX-Studio-app-*.zip \
             "NMOX-Studio-${{ needs.version.outputs.version }}-portable.zip"
      - name: Linux tar.gz and deb
        run: ./packaging/linux/build-packages.sh "${{ needs.version.outputs.version }}"
      - uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            NMOX-Studio-*-portable.zip
            NMOX-Studio-*-sbom.json
            application/target/dist/NMOX-Studio-*-linux.tar.gz
            application/target/dist/nmox-studio_*.deb
            target/netbeans_site/updates.xml
            target/netbeans_site/updates.xml.gz
            target/netbeans_site/*.nbm

  macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Stamp version into branding
        run: |
          sed -i '' "s/currentVersion=NMOX Studio .*/currentVersion=NMOX Studio ${{ needs.version.outputs.version }}/" \
            branding/src/main/nbm-branding/core/core.jar/org/netbeans/core/startup/Bundle.properties
          # Module spec versions ride the same tag (ledger 20).
          sed -i '' "s|<spec.version>.*</spec.version>|<spec.version>${{ needs.version.outputs.version }}</spec.version>|" \
            pom.xml
      - name: Build application
        run: mvn -B clean package -DskipTests
      - name: Build DMG
        run: ./packaging/macos/build-dmg.sh "${{ needs.version.outputs.version }}"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: application/target/dist/NMOX-Studio-*-macos.dmg

  windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Stamp version into branding
        shell: pwsh
        run: |
          $f = "branding/src/main/nbm-branding/core/core.jar/org/netbeans/core/startup/Bundle.properties"
          (Get-Content $f) -replace 'currentVersion=NMOX Studio .*', 'currentVersion=NMOX Studio ${{ needs.version.outputs.version }}' | Set-Content $f
          # Module spec versions ride the same tag (ledger 20).
          $p = "pom.xml"
          (Get-Content $p) -replace '<spec\.version>.*</spec\.version>', '<spec.version>${{ needs.version.outputs.version }}</spec.version>' | Set-Content $p
      - name: Build application
        run: mvn -B clean package -DskipTests
      - name: Bundle Java runtime
        shell: pwsh
        run: |
          & "$env:JAVA_HOME\bin\jlink.exe" `
            --module-path "$env:JAVA_HOME\jmods" `
            --add-modules ALL-MODULE-PATH `
            --strip-debug --no-header-files --no-man-pages `
            --output application\target\nmoxstudio\jre
          Add-Content application\target\nmoxstudio\etc\nmoxstudio.conf "`n# bundled runtime: the app runs on its own Java, whatever the host has`njdkhome=`"jre`""
      - name: Brand launcher icons
        # The nbm-maven-plugin launcher stubs ship with the stock NetBeans
        # icon; swap in ours so the exe file icon and pinned-taskbar icon
        # are branded (shortcuts get theirs via IconFilename in the .iss).
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile rcedit.exe
          $launchers = Get-ChildItem application\target\nmoxstudio\bin\*.exe
          if (-not $launchers) { throw "no launcher exes found to brand" }
          foreach ($exe in $launchers) {
            & .\rcedit.exe $exe.FullName --set-icon packaging\icons\nmox-studio.ico
            if ($LASTEXITCODE -ne 0) { throw "rcedit failed on $($exe.Name)" }
            Write-Host "branded $($exe.Name)"
          }
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ needs.version.outputs.version }} `
            packaging\windows\nmox-studio.iss
      - uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: application/target/dist/NMOX-Studio-*-windows-setup.exe

  release:
    needs: [version, linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: NMOX Studio ${{ needs.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/NMOX-Studio-*-portable.zip
            artifacts/**/NMOX-Studio-*-sbom.json
            artifacts/**/NMOX-Studio-*-linux.tar.gz
            artifacts/**/nmox-studio_*.deb
            artifacts/**/NMOX-Studio-*-macos.dmg
            artifacts/**/NMOX-Studio-*-windows-setup.exe
            artifacts/**/updates.xml
            artifacts/**/updates.xml.gz
            artifacts/**/*.nbm

  homebrew:
    needs: [version, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Download macOS DMG
        uses: actions/download-artifact@v8
        with:
          name: macos-artifacts
          path: dmg

      - name: Compute SHA256
        id: sha
        run: |
          DMG=$(ls dmg/NMOX-Studio-*-macos.dmg)
          echo "sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Write cask
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          mkdir -p Casks
          cat > Casks/nmox-studio.rb <<EOF
          cask "nmox-studio" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/NMOX/NMOX-Studio/releases/download/v#{version}/NMOX-Studio-#{version}-macos.dmg",
                verified: "github.com/NMOX/NMOX-Studio/"
            name "NMOX Studio"
            desc "NetBeans RCP-based IDE for web development"
            homepage "https://github.com/NMOX/NMOX-Studio"

            depends_on macos: :big_sur

            app "NMOX Studio.app"

            zap trash: [
              "~/Library/Application Support/NMOXStudio",
              "~/Library/Caches/org.nmox.studio",
              "~/Library/Preferences/org.nmox.studio.plist",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/nmox-studio.rb
          if git diff --cached --quiet; then
            echo "Cask already current; nothing to commit."
          else
            git commit -m "nmox-studio ${{ needs.version.outputs.version }}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
