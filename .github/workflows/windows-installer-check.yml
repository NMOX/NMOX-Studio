name: Windows installer check

# Proves the Windows cosmetic surface end-to-end on a real windows-latest
# runner: the launcher exes get the branded icon (rcedit), the setup exe
# wears it (SetupIconFile), and the installed Start-menu/desktop shortcuts
# point at it (IconFilename). Mirrors the release workflow's Windows job
# minus jlink (the bundled JRE is irrelevant to icon branding and costs
# minutes). Runs on PRs that touch the Windows packaging surface, and on
# demand via workflow_dispatch.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packaging/windows/**'
      - 'packaging/icons/**'
      - 'packaging/tools/**'
      - '.github/workflows/windows-installer-check.yml'
      - '.github/workflows/release.yml'

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build application
        run: mvn -B clean package -DskipTests

      # Keep in sync with the "Brand launcher icons" step in release.yml.
      - name: Brand launcher icons
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile rcedit.exe
          $launchers = Get-ChildItem application\target\nmoxstudio\bin\*.exe
          if (-not $launchers) { throw "no launcher exes found to brand" }
          foreach ($exe in $launchers) {
            & .\rcedit.exe $exe.FullName --set-icon packaging\icons\nmox-studio.ico
            if ($LASTEXITCODE -ne 0) { throw "rcedit failed on $($exe.Name)" }
            Write-Host "branded $($exe.Name)"
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            packaging\windows\nmox-studio.iss

      # rcedit and ISCC both store icon image entries verbatim as RT_ICON
      # resources, so the branded 256px PNG entry from our .ico must appear
      # byte-for-byte inside every launcher exe and the setup exe itself.
      - name: Verify branded icon is embedded
        shell: python
        run: |
          import glob, struct, pathlib

          ico = pathlib.Path('packaging/icons/nmox-studio.ico').read_bytes()
          count = struct.unpack_from('<H', ico, 4)[0]
          png = None
          for i in range(count):
              width = ico[6 + 16 * i]
              size, off = struct.unpack_from('<II', ico, 6 + 16 * i + 8)
              if width == 0:  # 0 encodes the 256px entry
                  png = ico[off:off + size]
          assert png and png[:8] == b'\x89PNG\r\n\x1a\n', 'no PNG 256px entry in the .ico'

          targets = sorted(glob.glob('application/target/nmoxstudio/bin/*.exe'))
          setups = glob.glob('application/target/dist/NMOX-Studio-*-windows-setup.exe')
          assert targets, 'no launcher exes found'
          assert setups, 'no setup exe found'
          targets += setups
          for target in targets:
              data = pathlib.Path(target).read_bytes()
              if png not in data:
                  raise SystemExit(f'FAIL: {target} does not embed the branded icon')
              print(f'OK: {target} embeds the branded icon')

      # Install for real (silently) and check what a user's Start menu and
      # desktop actually get: shortcuts whose icon is the shipped .ico.
      - name: Verify installed shortcuts
        shell: pwsh
        run: |
          $setup = Get-ChildItem application\target\dist\NMOX-Studio-*-windows-setup.exe
          Start-Process -FilePath $setup.FullName -Wait -ArgumentList `
            '/VERYSILENT','/SUPPRESSMSGBOXES','/CURRENTUSER','/TASKS=desktopicon','/NORESTART'
          $app = "$env:LOCALAPPDATA\Programs\NMOX Studio"
          if (-not (Test-Path "$app\nmox-studio.ico")) { throw "nmox-studio.ico not installed into $app" }
          $shell = New-Object -ComObject WScript.Shell
          $links = @(
            "$env:APPDATA\Microsoft\Windows\Start Menu\Programs\NMOX Studio\NMOX Studio.lnk",
            "$env:USERPROFILE\Desktop\NMOX Studio.lnk"
          )
          foreach ($path in $links) {
            if (-not (Test-Path $path)) { throw "missing shortcut: $path" }
            $icon = $shell.CreateShortcut($path).IconLocation
            Write-Host "$path -> icon $icon"
            if ($icon -notmatch 'nmox-studio\.ico') { throw "unbranded shortcut icon: $icon" }
          }
