# NMOX Studio configuration file

# Default locations of userdir and cachedir
default_userdir="${DEFAULT_USERDIR_ROOT}/dev"
default_cachedir="${DEFAULT_CACHEDIR_ROOT}/dev"

# options used by the launcher by default, can be overridden by explicit
# command line switches
#
# The --add-opens flags are REQUIRED: the NetBeans Platform reflects into
# JDK internals (windowing, Swing text, security) that the Java 9+ module
# system seals by default. Removing any of them breaks startup on
# Java 17+ with InaccessibleObjectException.
default_options="--branding nmoxstudio --laf com.formdev.flatlaf.FlatDarkLaf -J-XX:+IgnoreUnrecognizedVMOptions -J--add-opens=java.base/java.net=ALL-UNNAMED -J--add-opens=java.base/java.lang=ALL-UNNAMED -J--add-opens=java.base/java.lang.reflect=ALL-UNNAMED -J--add-opens=java.base/java.io=ALL-UNNAMED -J--add-opens=java.base/java.security=ALL-UNNAMED -J--add-opens=java.base/java.util=ALL-UNNAMED -J--add-opens=java.desktop/javax.swing=ALL-UNNAMED -J--add-opens=java.desktop/javax.swing.text=ALL-UNNAMED -J--add-opens=java.desktop/java.awt=ALL-UNNAMED -J--add-opens=java.desktop/sun.awt=ALL-UNNAMED"
# for development purposes you may wish to append: -J-Dnetbeans.logger.console=true -J-ea

# default location of JDK/JRE, can be overridden by using --jdkhome <dir> switch.
# Deliberately unset for distribution: the launcher falls back to JAVA_HOME
# and then to `java` on PATH. NMOX Studio requires JDK 17 or newer.
#jdkhome="/path/to/jdk-17"

# clusters' paths separated by path.separator (semicolon on Windows, colon on Unices)
#extra_clusters=
